name: Update Publications

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - run: pip install scholarly

      - run: |
          python <<EOF
          from scholarly import scholarly
          import json

          author = scholarly.search_author_id("TGPUMvYAAAAJ")
          author = scholarly.fill(author)

          pubs = []
          for pub in author['publications'][:20]:
              pub_filled = scholarly.fill(pub)
              pubs.append({
                  "title": pub_filled['bib'].get('title', ''),
                  "year": pub_filled['bib'].get('pub_year', '')
              })

          with open("publications.json", "w") as f:
              json.dump(pubs, f, indent=2)
          EOF

      - run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add publications.json
          git commit -m "Auto update publications" || echo "No changes"
          git push
